server:
  host: "0.0.0.0"
  port: 8080

storage:
  base_path: "/data"

registration:
  mode: "self"
  default_role: "registered"
  allow_anonymous_browse: true
  allow_anonymous_download: true

cors:
  enabled: true
  allowed_origins:
    - "https://reader.mokuro.app"
    - "http://localhost:*"
    - "http://127.0.0.1:*"
    - "http://192.168.*.*:*"
  allow_credentials: true

ssl:
  enabled: false

admin:
  enabled: true
  path: "/_admin"

catalog:
  enabled: true
  reader_url: "https://reader.mokuro.app"
  use_as_homepage: true

queue:
  show_in_nav: true
  public_access: true

ocr:
  backend: auto
  poll_interval: 30
